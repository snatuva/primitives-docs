<div class="space-y-6">
  <div>
    <h1 class="text-3xl font-bold text-white tracking-tight">Tooltip</h1>
    <p class="text-slate-400 mt-2 text-lg">A popup that displays information related to an element when the element
      receives keyboard focus or the mouse hovers over it.</p>
  </div>

  <app-example-viewer title="Basic Tooltip" description="A simple tooltip that appears on hover or focus."
    [code]="tooltipCode">

    <div apTooltip>
      <button apTooltipTrigger
        class="px-4 py-2 bg-primary text-white rounded hover:bg-blue-600 transition-colors focus:ring-2 focus:ring-primary focus:outline-none">
        Hover me
      </button>
      <ng-template apTooltipContent [tooltipId]="'my-tooltip-id'">
        <div class="px-3 py-2 bg-slate-800 text-white text-sm rounded shadow-lg border border-border">
          This is a helpful tooltip!
        </div>
      </ng-template>
    </div>

  </app-example-viewer>

  <app-api-table title="API Reference" [properties]="apiProperties"></app-api-table>
</div>
