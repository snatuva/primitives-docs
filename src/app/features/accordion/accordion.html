<div class="space-y-6">
  <div>
    <h1 class="text-3xl font-bold text-white tracking-tight">Accordion</h1>
    <p class="text-slate-400 mt-2 text-lg">A vertically stacked set of interactive headings that each reveal a section of content.</p>
  </div>

  <app-example-viewer 
    title="Basic Accordion" 
    description="A single-expand accordion. Only one item can be opened at a time." 
    [code]="accordionCode">
    
    <div apAccordion type="single" [collapsible]="true" class="w-full max-w-md mx-auto rounded-lg overflow-hidden border border-border">
        <div apAccordionItem itemId="item-1" class="border-b border-border last:border-b-0">
            <button apAccordionTrigger class="w-full flex justify-between items-center px-4 py-3 bg-surface hover:bg-surface/80 text-white font-medium focus:outline-none focus:ring-2 focus:ring-primary focus:ring-inset data-[state=open]:bg-surface/80 group">
                What are headless UI primitives?
                <svg class="w-4 h-4 transition-transform duration-200 group-data-[state=open]:rotate-180" viewBox="0 0 16 16" fill="none" aria-hidden="true">
                    <path d="M4 6l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" />
                </svg>
            </button>
            <div apAccordionContent class="px-4 py-3 bg-background text-slate-400 text-sm overflow-hidden data-[state=closed]:hidden">
                Headless primitives provide behavior and accessibility without imposing
                any visual styles. You supply the markup and CSS.
            </div>
        </div>
        <div apAccordionItem itemId="item-2" class="border-b border-border last:border-b-0">
            <button apAccordionTrigger class="w-full flex justify-between items-center px-4 py-3 bg-surface hover:bg-surface/80 text-white font-medium focus:outline-none focus:ring-2 focus:ring-primary focus:ring-inset data-[state=open]:bg-surface/80 group">
                Why signals-first?
                <svg class="w-4 h-4 transition-transform duration-200 group-data-[state=open]:rotate-180" viewBox="0 0 16 16" fill="none" aria-hidden="true">
                    <path d="M4 6l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" />
                </svg>
            </button>
            <div apAccordionContent class="px-4 py-3 bg-background text-slate-400 text-sm overflow-hidden data-[state=closed]:hidden">
                Angular Signals provide fine-grained reactivity with zero Zone.js overhead.
            </div>
        </div>
    </div>

  </app-example-viewer>

  <app-api-table title="API Reference (apAccordion)" [properties]="apiProperties"></app-api-table>
</div>
