<div class="space-y-6">
  <div>
    <h1 class="text-3xl font-serif font-semibold text-ink tracking-tight">Dialog</h1>
    <p class="text-ink-muted mt-2 text-lg">A window overlaid on either the primary window or another dialog window, rendering the content underneath inert.</p>
  </div>

  <app-example-viewer
    title="Basic Dialog"
    description="Built on the native <dialog> element — the browser handles the top layer, focus trap, and focus restoration for you."
    [code]="dialogCode">

    <div apDialog>
        <button apDialogTrigger class="px-4 py-2 bg-primary text-white rounded hover:bg-primary-hover transition-colors focus:ring-2 focus:ring-primary focus:outline-none">
            Open Dialog
        </button>
        <dialog apDialogContent class="panel">
            <h2 apDialogTitle class="text-lg font-semibold text-ink">Edit profile</h2>
            <p apDialogDescription class="text-sm text-ink-muted">
                Make changes to your profile here. Click save when you're done.
            </p>
            <div class="flex justify-end gap-3 mt-4">
                <button apDialogClose class="px-4 py-2 bg-transparent border border-border text-ink-muted hover:text-ink hover:bg-surface-hover rounded transition-colors focus:ring-2 focus:ring-primary/30 focus:outline-none">
                    Cancel
                </button>
                <button apDialogClose class="px-4 py-2 bg-primary text-white rounded hover:bg-primary-hover transition-colors focus:ring-2 focus:ring-primary focus:outline-none">
                    Save changes
                </button>
            </div>
        </dialog>
    </div>

  </app-example-viewer>

  <app-api-table title="API Reference (apDialog)" [properties]="apiProperties"></app-api-table>
  <app-api-table title="API Reference (apDialogContent)" [properties]="contentApiProperties"></app-api-table>
</div>
