<div class="my-8 rounded-xl border border-border bg-surface overflow-hidden shadow-sm">
  <!-- Header -->
  <div class="px-6 py-4 border-b border-border flex justify-between items-center bg-surface/50">
    <div>
      @if (title()) {
        <h3 class="text-lg font-medium text-white">{{ title() }}</h3>
      }
      @if (description()) {
        <p class="text-sm text-slate-400 mt-1">{{ description() }}</p>
      }
    </div>
    <div class="flex gap-2">
      <button (click)="toggleCode()" class="p-2 rounded hover:bg-white/5 text-slate-400 hover:text-white transition-colors" [attr.aria-label]="showCode ? 'Hide code' : 'Show code'">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="16 18 22 12 16 6"></polyline>
          <polyline points="8 6 2 12 8 18"></polyline>
        </svg>
      </button>
    </div>
  </div>

  <!-- Preview Area -->
  <div class="p-8 bg-background flex flex-col items-center justify-center min-h-[200px]" [class.hidden]="showCode">
    <ng-content></ng-content>
  </div>

  <!-- Code Area -->
  <div class="relative bg-slate-950" [class.hidden]="!showCode">
    <div class="absolute right-4 top-4">
      <button (click)="copyCode()" class="p-2 rounded bg-white/10 hover:bg-white/20 text-slate-300 transition-colors" aria-label="Copy code">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
          <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
        </svg>
      </button>
    </div>
    <pre class="p-6 overflow-x-auto text-sm text-slate-300"><code [innerHTML]="highlightedCode"></code></pre>
  </div>
</div>
