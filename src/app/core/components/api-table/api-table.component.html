<div class="my-8">
  <h3 class="text-xl font-semibold font-serif text-ink mb-4">{{ title() }}</h3>
  <div class="overflow-x-auto rounded-xl border border-border bg-surface">
    <table class="w-full text-left border-collapse text-sm">
      <thead>
        <tr class="border-b border-border bg-surface-hover text-ink">
          <th class="px-6 py-4 font-medium">Property</th>
          <th class="px-6 py-4 font-medium">Type</th>
          <th class="px-6 py-4 font-medium">Default</th>
          <th class="px-6 py-4 font-medium">Description</th>
        </tr>
      </thead>
      <tbody class="divide-y divide-border">
        @for (prop of properties(); track prop.name) {
          <tr class="hover:bg-surface-hover transition-colors">
            <td class="px-6 py-4 font-mono text-primary whitespace-nowrap">{{ prop.name }}</td>
            <td class="px-6 py-4 font-mono text-secondary whitespace-nowrap">{{ prop.type }}</td>
            <td class="px-6 py-4 font-mono text-ink-muted whitespace-nowrap">{{ prop.default || '-' }}</td>
            <td class="px-6 py-4 text-ink-muted">{{ prop.description }}</td>
          </tr>
        }
        @if (properties().length === 0) {
          <tr>
            <td colspan="4" class="px-6 py-8 text-center text-ink-muted">No properties available.</td>
          </tr>
        }
      </tbody>
    </table>
  </div>
</div>
