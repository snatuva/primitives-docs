<div class="min-h-screen bg-background text-ink-muted font-sans selection:bg-primary/20">
  <!-- Top Navigation -->
  <header class="sticky top-0 z-40 w-full backdrop-blur-md flex-none transition-colors duration-500 lg:z-50 border-b border-border bg-background/90 shadow-sm">
    <div class="max-w-8xl mx-auto">
      <div class="py-4 lg:px-8 mx-4 lg:mx-0 flex items-center justify-between">
        <a routerLink="/" class="flex items-center gap-2 text-xl font-semibold font-serif tracking-tight text-ink hover:opacity-80 transition-opacity">
          <span class="text-primary">Angular</span>
          <span>Primitives</span>
        </a>
        <nav class="flex items-center gap-6">
          <a href="https://github.com/snatuva/angular-primitives" target="_blank" class="flex items-center gap-2 px-3 py-1.5 text-sm font-medium text-ink-muted bg-surface hover:bg-surface-hover hover:text-ink rounded-full border border-border transition-all">
            <svg class="w-4 h-4" viewBox="0 0 24 24" fill="currentColor">
              <path fill-rule="evenodd" clip-rule="evenodd" d="M12 2C6.477 2 2 6.477 2 12c0 4.42 2.865 8.166 6.839 9.489.5.092.682-.217.682-.482 0-.237-.008-.866-.013-1.699-2.782.603-3.369-1.34-3.369-1.34-.454-1.156-1.11-1.462-1.11-1.462-.908-.62.069-.608.069-.608 1.003.07 1.531 1.03 1.531 1.03.892 1.529 2.341 1.087 2.91.831.092-.646.35-1.086.636-1.336-2.22-.253-4.555-1.11-4.555-4.943 0-1.091.39-1.984 1.03-2.682-.103-.253-.447-1.27.098-2.646 0 0 .84-.269 2.75 1.025A9.578 9.578 0 0112 6.836c.85.004 1.705.114 2.504.336 1.909-1.294 2.747-1.025 2.747-1.025.546 1.376.202 2.394.1 2.646.64.699 1.026 1.591 1.026 2.682 0 3.841-2.337 4.687-4.565 4.935.359.309.678.919.678 1.852 0 1.336-.012 2.415-.012 2.743 0 .267.18.578.688.48C19.138 20.161 22 16.418 22 12c0-5.523-4.477-10-10-10z"></path>
            </svg>
            GitHub
          </a>
        </nav>
      </div>
    </div>
  </header>

  <div class="max-w-8xl mx-auto px-4 sm:px-6 md:px-8">
    <!-- Sidebar -->
    <div class="hidden lg:block fixed z-20 inset-0 top-[4rem] left-[max(0px,calc(50%-45rem))] right-auto w-[19rem] pb-10 px-8 overflow-y-auto border-r border-border">
      <nav class="lg:text-sm lg:leading-6 relative">
        <ul class="mt-8 space-y-4">
          <li>
            <h5 class="mb-3 font-semibold text-ink tracking-wide uppercase text-xs">Components</h5>
            <ul class="space-y-1 mt-2">
              @for (item of navItems; track item.path) {
                <li>
                  <a [routerLink]="item.path"
                     routerLinkActive="bg-primary/10 text-primary font-medium"
                     [routerLinkActiveOptions]="{exact: false}"
                     class="flex items-center px-3 py-2 -mx-3 rounded-lg text-ink-muted hover:text-ink hover:bg-surface-hover transition-all group">
                    <span class="w-1.5 h-1.5 rounded-full mr-3 transition-colors bg-transparent group-hover:bg-border"
                          [class.bg-primary]="rla.isActive"
                          #rla="routerLinkActive" routerLinkActive></span>
                    {{ item.label }}
                  </a>
                </li>
              }
            </ul>
          </li>
        </ul>
      </nav>
    </div>

    <!-- Main Content -->
    <main class="lg:pl-[19.5rem]">
      <div class="max-w-4xl mx-auto pt-12 pb-24 xl:max-w-none xl:ml-0 xl:mr-[15.5rem] xl:pr-16">
        <router-outlet></router-outlet>
      </div>
    </main>
  </div>
</div>
